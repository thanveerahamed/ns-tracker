name: Deploy to Firebase Hosting on merge
'on':
  workflow_dispatch:
  push:
    branches:
      - main
env:
  CI: false
  VITE_NS_OCP_APIM_KEY: ${{ secrets.VITE_NS_OCP_APIM_KEY }}
  VITE_NS_OCP_API_ENDPOINT: ${{ secrets.VITE_NS_OCP_API_ENDPOINT }}
  VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
  VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
  VITE_FIREBASE_MESSAGE_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGE_SENDER_ID }}
  VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
  VITE_GOOGLE_MAP_API: ${{ secrets.VITE_GOOGLE_MAP_API }}

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: install dependencies
        run: pnpm install --frozen-lockfile
      - name: format check
        run: pnpm format:check
      - name: lint check
        run: pnpm lint:check
      - name: type check
        run: pnpm type:check
      - name: run build
        run: pnpm build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_NS_TRACKER_APP }}'
          channelId: live
          projectId: ns-tracker-app
